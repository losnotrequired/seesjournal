# Sources the updater reads every run. Edit freely.
# Prefer official iCal/RSS feeds or APIs where a venue offers them — they are
# more reliable and clearly permitted. For pages, the script checks robots.txt
# and skips anything disallowed. You are responsible for each site's Terms of Use.
#
# type: html  -> fetch page, let Claude extract events from the visible text
# (ical / rss support is stubbed in the script as an easy extension)

