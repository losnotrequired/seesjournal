name: Update listings

on:
  schedule:
    - cron: "0 9 */3 * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-listings
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Update listings
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/update_listings.py

      - name: Commit & push if anything changed
        run: |
          git config user.name "listings-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/events.json index.html onview.html
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "Auto-update listings ($(date -u +%Y-%m-%d))"
            git pull --rebase origin main || true
            git push origin HEAD:main
          fi
