name: Update listings

on:
  schedule:
    - cron: "0 9 */3 * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-listings
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Install headless browser (for JS-heavy sites)
        run: python -m playwright install --with-deps chromium

      - name: Update listings
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/update_listings.py --ignore-robots --render-js

      - name: Commit & push if anything changed
        run: |
          git config user.name "listings-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # These files are regenerated every run, so the bot's fresh version must win.
          # Rebasing/merging them causes guaranteed conflicts; instead, take the latest
          # remote, drop our freshly generated files on top, and push as a clean commit.
          mkdir -p /tmp/gen
          cp data/events.json /tmp/gen/events.json
          cp index.html /tmp/gen/index.html
          cp onview.html /tmp/gen/onview.html
          published=0
          for i in 1 2 3 4 5; do
            git fetch origin main
            git reset --hard FETCH_HEAD
            cp /tmp/gen/events.json data/events.json
            cp /tmp/gen/index.html index.html
            cp /tmp/gen/onview.html onview.html
            git add data/events.json index.html onview.html
            if git diff --staged --quiet; then
              echo "No changes to publish."; published=1; break
            fi
            git commit -m "Auto-update listings ($(date -u +%Y-%m-%d))"
            if git push origin HEAD:main; then
              echo "Published."; published=1; break
            fi
            echo "Push race detected, retrying ($i)..."; sleep 3
          done
          if [ "$published" != "1" ]; then
            echo "::error::Failed to publish after retries"; exit 1
          fi
